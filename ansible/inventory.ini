[stateless_node]
# Node 1: Stateless 방화벽 (nftables, netdev ingress hook)
# 호스트 IP: 192.168.100.3  /  IPVLAN 컨테이너 IP: 192.168.100.7
node1 ansible_host=192.168.100.3 ansible_user=geonmo

[stateful_node]
# Node 2: Stateful 방화벽 (zfw eBPF, TC hook, BPF 맵 상태 추적)
# 호스트 IP: 192.168.100.4  /  IPVLAN 컨테이너 IP: 192.168.100.8
node2 ansible_host=192.168.100.4 ansible_user=geonmo

[attack_node]
# 공격 서버: ACK flood + Web UI (192.168.100.5)
attacker ansible_host=192.168.100.5 ansible_user=geonmo

[guest_node]
# 정상 손님: TCP 3-way handshake 접속 테스트 (192.168.100.6)
guest ansible_host=192.168.100.6 ansible_user=geonmo

# ── Node 1 변수 ───────────────────────────────────────────────
[stateless_node:vars]
packet_logger_firewall_mode  = stateless
packet_logger_node_name      = node1-stateless
packet_logger_container_ip   = 192.168.100.7
packet_logger_ipvlan_parent  = eth1
packet_logger_ipvlan_subnet  = 192.168.100.0/24
packet_logger_ipvlan_gateway = 192.168.100.1
packet_logger_port           = 8080
packet_logger_api_port       = 9090

# ── Node 2 변수 ───────────────────────────────────────────────
[stateful_node:vars]
packet_logger_firewall_mode  = stateful
packet_logger_node_name      = node2-stateful
packet_logger_container_ip   = 192.168.100.8
packet_logger_ipvlan_parent  = eth1
packet_logger_ipvlan_subnet  = 192.168.100.0/24
packet_logger_ipvlan_gateway = 192.168.100.1
packet_logger_port           = 8080
packet_logger_api_port       = 9090
zfw_version                  = v0.9.22

# ── 공격 서버 변수 ────────────────────────────────────────────
[attack_node:vars]
attack_server_node1_ip    = 192.168.100.7
attack_server_node2_ip    = 192.168.100.8
attack_server_node1_api   = http://192.168.100.7:9090
attack_server_node2_api   = http://192.168.100.8:9090
attack_server_guest_api   = http://192.168.100.6:7070
attack_server_target_port = 8080
attack_server_web_port    = 8000

# ── 손님 클라이언트 변수 ──────────────────────────────────────
[guest_node:vars]
guest_client_node1_ip   = 192.168.100.7
guest_client_node2_ip   = 192.168.100.8
guest_client_port       = 8080
guest_client_api_port   = 7070
guest_client_interval   = 5.0

[all:vars]
ansible_python_interpreter=/usr/bin/python3
